name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  ci:
    name: Lint, test & SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: xdebug

      - name: Validate composer.json
        run: composer validate --no-check-publish || true

      - name: Lint PHP
        run: |
          files=$(find . -path ./vendor -prune -o -name '*.php' -print)
          if [ -z "$files" ]; then
            echo "No PHP files yet , skipping lint (standalone core not migrated yet)."
          else
            echo "$files" | xargs -n1 php -l
          fi

      - name: Tests
        run: |
          if [ -d tests ] && [ -n "$(find tests -name '*.php' 2>/dev/null)" ]; then
            composer install --prefer-dist --no-progress
            vendor/bin/phpunit --coverage-text
          else
            echo "No tests yet , add them as the standalone core lands."
          fi

      - name: SBOM
        run: |
          if [ -f composer.lock ]; then
            composer global require cyclonedx/cyclonedx-php-composer || true
            composer CycloneDX:make-sbom --output-file=sbom.json || true
          else
            echo "No composer.lock yet , SBOM generates once dependencies are committed."
          fi
